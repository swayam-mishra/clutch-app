name: clutch_app
description: "Clutch — a dark-themed Gen Z budgeting app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2

  # Persistence
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
